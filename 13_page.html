<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone XR Cart UI</title></head>
    <link rel="stylesheet" href="13_page.css">
<body>

    <div class="iphone-xr">
        <header class="header">
            <div class="back-icon">
                <a href="8_page.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
            </div>
            <h1>Cart</h1>
            <div style="width: 24px;"></div>
        </header>

        <!-- Hint -->
        <div class="swipe-hint">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
            <span>swipe on an item to delete</span>
        </div>

        <!-- List -->
        <div class="cart-list">
            
            <div class="item-row">
                <div class="card">
                    <img src="assets/Mask Group (1).png" class="item-img" alt="" width="69px" height="69px">
                    <div class="item-info">
                        <h3>Veggie tomato mix</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
            </div>

            <div class="item-row">
                <div class="card">
                    <img src="assets/Mask Group (2).png" class="item-img" alt="" width="60px" height="69px">
                    <div class="item-info">
                        <h3>Fishwith mix orange....</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
            </div>

            <!-- Item 3 (Swiped as in your photo) -->
            <div class="swipe-container">
                <div class="card">
                    <!-- Картинка скрыта, как в макете при свайпе -->
                    <div class="item-info">
                        <h3>Veggie tomato mix</h3>
                        <p class="price">#1,900</p>
                    </div>
                    <div class="stepper">
                        <b>-</b> <span>1</span> <b>+</b>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="circle-btn btn-heart">
                       <img src="assets/Vector (2).png" alt="dfgv" width="16px" height="14px">
                    </button>
                    <button class="circle-btn btn-orange">
                        <!-- Пустой оранжевый круг -->
                    </button>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="11_page.html">
            <button class="complete-order">Complete order</button>
            </a>
        </div>
    </div>

</body>
</html>
